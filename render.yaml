services:
  - type: web
    name: stock-watcher
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    envVars:
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_AUTH
        sync: false
